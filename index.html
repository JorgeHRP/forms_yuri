<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #18181f;
      --border: rgba(255,255,255,0.07);
      --border-focus: rgba(99,102,241,0.6);
      --accent: #6366f1;
      --accent2: #a855f7;
      --text: #f0f0f5;
      --muted: #6b7280;
      --success: #10b981;
      --error: #f43f5e;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glowing blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #6366f1, transparent);
      top: -200px; left: -100px;
      animation: float1 12s ease-in-out infinite;
    }
    .blob-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #a855f7, transparent);
      bottom: -150px; right: -100px;
      animation: float2 15s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(40px, 30px) scale(1.1); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-30px, -20px) scale(1.05); }
    }

    .wrapper {
      width: 100%;
      max-width: 520px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeDown 0.6s ease both;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.25);
      padding: 5px 12px;
      border-radius: 100px;
      margin-bottom: 1.25rem;
    }

    .badge::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.15;
      background: linear-gradient(135deg, #f0f0f5 30%, rgba(99,102,241,0.9));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.6rem;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.25rem;
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 20px 60px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.05);
      animation: fadeUp 0.6s ease 0.1s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .field {
      margin-bottom: 1.5rem;
      animation: fadeUp 0.6s ease both;
    }
    .field:nth-child(1) { animation-delay: 0.15s; }
    .field:nth-child(2) { animation-delay: 0.22s; }
    .field:nth-child(3) { animation-delay: 0.29s; }
    .field:nth-child(4) { animation-delay: 0.36s; }

    label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.55rem;
      transition: color 0.2s;
    }

    .field:focus-within label { color: var(--accent); }

    .field-icon-wrap {
      position: relative;
    }

    .field-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      transition: color 0.2s;
      display: flex;
      align-items: center;
    }

    .field:focus-within .field-icon { color: var(--accent); }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0.85rem 1rem 0.85rem 2.75rem;
      font-family: 'Sora', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input::placeholder { color: rgba(107,114,128,0.5); }

    input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 4px rgba(99,102,241,0.12);
      background: rgba(99,102,241,0.04);
    }

    input.valid {
      border-color: rgba(16,185,129,0.4);
    }
    input.invalid {
      border-color: rgba(244,63,94,0.4);
    }

    .hint {
      font-size: 0.72rem;
      margin-top: 0.4rem;
      padding-left: 2px;
      min-height: 1em;
      transition: all 0.2s;
    }
    .hint.error  { color: var(--error); }
    .hint.ok     { color: var(--success); }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.75rem 0;
    }

    /* Button */
    .btn-wrap {
      position: relative;
    }

    button[type="submit"] {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      font-family: 'Sora', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #fff;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 4px 20px rgba(99,102,241,0.35);
    }

    button[type="submit"]::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    button[type="submit"]:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(99,102,241,0.5);
    }
    button[type="submit"]:hover::before { opacity: 1; }
    button[type="submit"]:active:not(:disabled) { transform: translateY(0); }
    button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.2s;
    }

    /* Spinner */
    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      padding: 1rem 1.75rem;
      border-radius: 14px;
      font-size: 0.9rem;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 100;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }

    .toast.success {
      background: rgba(16,185,129,0.15);
      border: 1px solid rgba(16,185,129,0.3);
      color: #10b981;
      box-shadow: 0 8px 32px rgba(16,185,129,0.2);
    }

    .toast.error {
      background: rgba(244,63,94,0.15);
      border: 1px solid rgba(244,63,94,0.3);
      color: #f43f5e;
      box-shadow: 0 8px 32px rgba(244,63,94,0.2);
    }

    .footer-note {
      text-align: center;
      font-size: 0.72rem;
      color: rgba(107,114,128,0.5);
      margin-top: 1.5rem;
      letter-spacing: 0.02em;
    }

    /* SVG Icons inline */
    svg { flex-shrink: 0; }
  </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="wrapper">

  <div class="header">
    <div class="badge">Cadastro</div>
    <h1>Seus dados,<br>com segurança</h1>
    <p class="subtitle">Preencha o formulário abaixo para continuar</p>
  </div>

  <div class="card">
    <form id="form" novalidate>

      <!-- Nome -->
      <div class="field" id="field-nome">
        <label for="nome">
          Nome completo
        </label>
        <div class="field-icon-wrap">
          <span class="field-icon">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0zM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
            </svg>
          </span>
          <input type="text" id="nome" name="nome" placeholder="João da Silva" autocomplete="name" />
        </div>
        <p class="hint" id="hint-nome"></p>
      </div>

      <!-- Telefone -->
      <div class="field" id="field-telefone">
        <label for="telefone">Telefone</label>
        <div class="field-icon-wrap">
          <span class="field-icon">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 0 1-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 4.5v2.25z"/>
            </svg>
          </span>
          <input type="tel" id="telefone" name="telefone" placeholder="(11) 91234-5678" autocomplete="tel" />
        </div>
        <p class="hint" id="hint-telefone"></p>
      </div>

      <!-- CPF -->
      <div class="field" id="field-cpf">
        <label for="cpf">CPF</label>
        <div class="field-icon-wrap">
          <span class="field-icon">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25v10.5A2.25 2.25 0 0 0 4.5 19.5zm6-10.125a1.875 1.875 0 1 1-3.75 0 1.875 1.875 0 0 1 3.75 0zm1.294 6.336a6.721 6.721 0 0 1-3.17.789 6.721 6.721 0 0 1-3.168-.789 3.376 3.376 0 0 1 6.338 0z"/>
            </svg>
          </span>
          <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" inputmode="numeric" maxlength="14" />
        </div>
        <p class="hint" id="hint-cpf"></p>
      </div>

      <!-- Email -->
      <div class="field" id="field-email">
        <label for="email">E-mail</label>
        <div class="field-icon-wrap">
          <span class="field-icon">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/>
            </svg>
          </span>
          <input type="email" id="email" name="email" placeholder="joao@email.com" autocomplete="email" />
        </div>
        <p class="hint" id="hint-email"></p>
      </div>

      <div class="divider"></div>

      <div class="btn-wrap">
        <button type="submit" id="btn-submit">
          <div class="btn-content" id="btn-text">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12zm0 0h7.5"/>
            </svg>
            Enviar cadastro
          </div>
          <div class="spinner" id="spinner"></div>
        </button>
      </div>

    </form>
  </div>

  <p class="footer-note">Seus dados são protegidos e nunca serão compartilhados.</p>
</div>

<div class="toast" id="toast"></div>

<script>
  const WEBHOOK = 'https://jorge-n8n.rijyaf.easypanel.host/webhook-test/d2c5cc00-9f0b-42ae-a696-49a627956260';

  // ── Masks ─────────────────────────────────────────────────────────────────
  document.getElementById('cpf').addEventListener('input', function(e) {
    let v = e.target.value.replace(/\D/g, '').slice(0, 11);
    if (v.length > 9)      v = v.replace(/^(\d{3})(\d{3})(\d{3})(\d{0,2})/, '$1.$2.$3-$4');
    else if (v.length > 6) v = v.replace(/^(\d{3})(\d{3})(\d{0,3})/, '$1.$2.$3');
    else if (v.length > 3) v = v.replace(/^(\d{3})(\d{0,3})/, '$1.$2');
    e.target.value = v;
  });

  document.getElementById('telefone').addEventListener('input', function(e) {
    let v = e.target.value.replace(/\D/g, '').slice(0, 11);
    if (v.length > 10)      v = v.replace(/^(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
    else if (v.length > 6)  v = v.replace(/^(\d{2})(\d{4,5})(\d{0,4})/, '($1) $2-$3');
    else if (v.length > 2)  v = v.replace(/^(\d{2})(\d{0,5})/, '($1) $2');
    else if (v.length > 0)  v = v.replace(/^(\d{0,2})/, '($1');
    e.target.value = v;
  });

  // ── Validators ────────────────────────────────────────────────────────────
  function validateNome(val) {
    const parts = val.trim().split(/\s+/).filter(Boolean);
    if (!val.trim()) return { ok: false, msg: 'Nome é obrigatório.' };
    if (parts.length < 2) return { ok: false, msg: 'Informe nome e sobrenome.' };
    if (parts.some(p => p.length < 2)) return { ok: false, msg: 'Cada parte precisa ter ao menos 2 letras.' };
    return { ok: true, msg: '✓ Nome válido' };
  }

  function validateTelefone(val) {
    const digits = val.replace(/\D/g, '');
    if (!digits) return { ok: false, msg: 'Telefone é obrigatório.' };
    if (digits.length < 10 || digits.length > 11) return { ok: false, msg: 'Informe um telefone com 10 ou 11 dígitos.' };
    return { ok: true, msg: '✓ Telefone válido' };
  }

  function validateCPF(val) {
    const digits = val.replace(/\D/g, '');
    if (!digits) return { ok: false, msg: 'CPF é obrigatório.' };
    if (digits.length !== 11) return { ok: false, msg: 'CPF precisa ter 11 dígitos.' };
    if (/^(\d)\1{10}$/.test(digits)) return { ok: false, msg: 'CPF inválido.' };
    // Digit validation
    let sum = 0;
    for (let i = 0; i < 9; i++) sum += +digits[i] * (10 - i);
    let r = (sum * 10) % 11;
    if (r === 10 || r === 11) r = 0;
    if (r !== +digits[9]) return { ok: false, msg: 'CPF inválido.' };
    sum = 0;
    for (let i = 0; i < 10; i++) sum += +digits[i] * (11 - i);
    r = (sum * 10) % 11;
    if (r === 10 || r === 11) r = 0;
    if (r !== +digits[10]) return { ok: false, msg: 'CPF inválido.' };
    return { ok: true, msg: '✓ CPF válido' };
  }

  function validateEmail(val) {
    if (!val.trim()) return { ok: false, msg: 'E-mail é obrigatório.' };
    const re = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
    if (!re.test(val.trim())) return { ok: false, msg: 'Informe um e-mail válido.' };
    return { ok: true, msg: '✓ E-mail válido' };
  }

  const fields = [
    { id: 'nome',      validate: validateNome },
    { id: 'telefone',  validate: validateTelefone },
    { id: 'cpf',       validate: validateCPF },
    { id: 'email',     validate: validateEmail },
  ];

  function applyResult(id, res, touched) {
    const input = document.getElementById(id);
    const hint  = document.getElementById('hint-' + id);
    input.classList.toggle('valid',   touched && res.ok);
    input.classList.toggle('invalid', touched && !res.ok);
    hint.textContent = touched ? res.msg : '';
    hint.className   = 'hint ' + (touched ? (res.ok ? 'ok' : 'error') : '');
  }

  fields.forEach(({ id, validate }) => {
    const el = document.getElementById(id);
    el.addEventListener('blur',  () => applyResult(id, validate(el.value), true));
    el.addEventListener('input', () => {
      if (el.classList.contains('invalid') || el.classList.contains('valid'))
        applyResult(id, validate(el.value), true);
    });
  });

  // ── Toast ─────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type + ' show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.classList.remove('show'); }, 4000);
  }

  // ── Submit ────────────────────────────────────────────────────────────────
  document.getElementById('form').addEventListener('submit', async function(e) {
    e.preventDefault();

    let allOk = true;
    fields.forEach(({ id, validate }) => {
      const el = document.getElementById(id);
      const res = validate(el.value);
      applyResult(id, res, true);
      if (!res.ok) allOk = false;
    });

    if (!allOk) {
      showToast('Corrija os campos destacados.', 'error');
      return;
    }

    const btn     = document.getElementById('btn-submit');
    const btnText = document.getElementById('btn-text');
    const spinner = document.getElementById('spinner');

    btn.disabled        = true;
    btnText.style.opacity = '0';
    spinner.style.display = 'block';

    const payload = {
      nome:      document.getElementById('nome').value.trim(),
      telefone:  document.getElementById('telefone').value.trim(),
      cpf:       document.getElementById('cpf').value.trim(),
      email:     document.getElementById('email').value.trim(),
      timestamp: new Date().toISOString(),
    };

    try {
      const res = await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      if (res.ok) {
        showToast('✓ Cadastro enviado com sucesso!', 'success');
        document.getElementById('form').reset();
        fields.forEach(({ id }) => {
          const el = document.getElementById(id);
          el.classList.remove('valid', 'invalid');
          document.getElementById('hint-' + id).textContent = '';
        });
      } else {
        showToast('Erro no servidor. Tente novamente.', 'error');
      }
    } catch {
      showToast('Falha na conexão. Verifique sua internet.', 'error');
    } finally {
      btn.disabled          = false;
      btnText.style.opacity = '1';
      spinner.style.display = 'none';
    }
  });
</script>
</body>
</html>
